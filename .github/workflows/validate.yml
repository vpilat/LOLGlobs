name: Validate Entries

on:
  pull_request:
    paths:
      - '_globs/**'
      - 'scripts/**'

jobs:
  detect-changes:
    name: Detect Changed Platforms
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.filter.outputs.linux }}
      macos: ${{ steps.filter.outputs.macos }}
      windows-cmd: ${{ steps.filter.outputs.windows-cmd }}
      powershell: ${{ steps.filter.outputs.powershell }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            linux:
              - '_globs/linux/**'
            macos:
              - '_globs/macos/**'
            windows-cmd:
              - '_globs/windows-cmd/**'
            powershell:
              - '_globs/powershell/**'
            scripts:
              - 'scripts/**'

  schema:
    name: Schema Validation
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run schema validation
        run: python scripts/validate_schema.py

  globs-linux:
    name: Glob Resolution (Linux)
    needs: detect-changes
    if: needs.detect-changes.outputs.linux == 'true' || needs.detect-changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Install optional binaries (nmap, socat, ncat)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nmap socat ncat

      - name: Run glob resolution tests
        run: python scripts/validate_globs.py --platform linux

  globs-macos:
    name: Glob Resolution (macOS)
    needs: detect-changes
    if: needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.scripts == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run glob resolution tests
        run: python scripts/validate_globs.py --platform macos

  globs-windows:
    name: Glob Resolution (Windows)
    needs: detect-changes
    if: needs.detect-changes.outputs['windows-cmd'] == 'true' || needs.detect-changes.outputs.powershell == 'true' || needs.detect-changes.outputs.scripts == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run glob resolution tests (CMD)
        run: python scripts/validate_globs.py --platform windows-cmd

      - name: Run glob resolution tests (PowerShell)
        run: python scripts/validate_globs.py --platform powershell
